kind: ImageStream
apiVersion: image.openshift.io/v1
metadata:
  name: nmp-msa-frontend
spec:
  lookupPolicy:
    local: false
---
kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: nmp-msa-frontend-intermediate
spec:
  nodeSelector: null
  output:
    to:
      kind: ImageStreamTag
      name: nmp-msa-frontend:latest
  resources:
    limits:
      cpu: '1'
      memory: 4Gi
    requests:
      cpu: 250m
      memory: 2Gi
  strategy:
    type: Docker
    dockerStrategy:
      from:
        kind: ImageStreamTag
        name: 'node:22.23-bullseye'
      env:
        - name: GA_ENABLED
          value: 'true'
  source:
    type: Git
    dockerfile: |
      FROM node:22.23-bullseye
      RUN mkdir /src
      WORKDIR /src
      COPY . .
      RUN npm ci
      RUN npm run build
    git:
      uri: 'https://github.com/bcgov/agri-nmp-msa.git'
      ref: master
    contextDir: frontend
  triggers:
    - type: ConfigChange
    - type: GitHub
      github:
        secretReference:
          name: nmp-github-webhook
  runPolicy: SerialLatestOnly
